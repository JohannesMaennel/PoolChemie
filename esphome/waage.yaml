esphome:
  name: waage

  project:
    name: maennel.waage
    version: "0.1.0"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: INFO

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid  
  password: !secret wifi_password

  ap:
    ssid: !secret ap_ssid
    password: !secret ap_password

captive_portal:

web_server:
  port: 80

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password
  topic_prefix: Pool/Chemiewaage
  discovery: false
  
  on_message:
    - topic: Pool/Chemiewaage/cmd/waage1/tare
      then:
        - logger.log: "MQTT Tare Waage1 empfangen"
        - lambda: |-
            id(tare_w1) += id(waage1).state;

    - topic: Pool/Chemiewaage/cmd/waage1/tare_clear
      then:
        - logger.log: "MQTT Tare_clear Waage1 empfangen"
        - lambda: |-
            id(tare_w1) = 0;

    - topic: Pool/Chemiewaage/cmd/waage2/tare
      then:
        - logger.log: "MQTT Tare Waage2 empfangen"
        - lambda: |-
            id(tare_w2) += id(waage2).state;

    - topic: Pool/Chemiewaage/cmd/waage2/tare_clear
      then:
        - logger.log: "MQTT Tare_clear Waage2 empfangen"
        - lambda: |-
            id(tare_w2) = 0;


i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true

globals:
  - id: aktive_waage
    type: int
    restore_value: yes
    initial_value: "1"

  - id: nullpunkt_w1
    type: float
    restore_value: yes
    initial_value: "0"

  - id: referenz_w1
    type: float
    restore_value: yes
    initial_value: "100000"

  - id: referenzgewicht_w1
    type: float
    restore_value: yes
    initial_value: "1"

  - id: nullpunkt_w2
    type: float
    restore_value: yes
    initial_value: "0"

  - id: referenz_w2
    type: float
    restore_value: yes
    initial_value: "100000"

  - id: referenzgewicht_w2
    type: float
    restore_value: yes
    initial_value: "1"
    
  - id: tare_w1
    type: float
    restore_value: yes
    initial_value: "0"

  - id: tare_w2
    type: float
    restore_value: yes
    initial_value: "0"


font:
  - file: "gfonts://Roboto"
    id: font16
    size: 16

sensor:
  - platform: uptime
    name: "Laufzeit"

  - platform: wifi_signal
    name: "WLAN Signal"
    update_interval: 60s

  - platform: internal_temperature
    name: "ESP Temperatur"

  - platform: hx711
    id: waage1_raw
    dout_pin: GPIO18
    clk_pin: GPIO19
    gain: 128
    update_interval: 1s
    
    filters:
      - median:
          window_size: 2
          send_every: 1


  - platform: hx711
    id: waage2_raw
    dout_pin: GPIO25
    clk_pin: GPIO26
    gain: 128
    update_interval: 1s

    filters:
      - median:
          window_size: 2
          send_every: 1

  - platform: template
    id: waage1
    name: "Waage1"
    unit_of_measurement: "kg"
    accuracy_decimals: 3

    lambda: |-
      if (isnan(id(waage1_raw).state))
        return 0.0f;

      float span = id(referenz_w1) - id(nullpunkt_w1);

      if (abs(span) < 1)
        return 0.0f;

      float gewicht =
        ((id(waage1_raw).state - id(nullpunkt_w1))
        / span)
        * id(referenzgewicht_w1)- id(tare_w1);

      return gewicht;

    update_interval: 1s
    
    filters:
      - delta: 0.01 


  - platform: template
    id: waage2
    name: "Waage2"
    unit_of_measurement: "kg"
    accuracy_decimals: 3

    lambda: |-
      if (isnan(id(waage2_raw).state))
        return 0.0f;

      float span = id(referenz_w2) - id(nullpunkt_w2);

      if (abs(span) < 1)
        return 0.0f;

      float gewicht =
        ((id(waage2_raw).state - id(nullpunkt_w2))
        / span)
        * id(referenzgewicht_w2) - id(tare_w2);

      return gewicht;

    update_interval: 1s

    filters:
      - delta: 0.01
      
  - platform: template
    id: tare_sensor_w1
    name: "Waage1 Tara"
    unit_of_measurement: "kg"
    accuracy_decimals: 3

    lambda: |-
      return id(tare_w1);

    update_interval: 1s
    
    filters:
      - delta: 0.01

  - platform: template
    id: tare_sensor_w2
    name: "Waage2 Tara"
    unit_of_measurement: "kg"
    accuracy_decimals: 3

    lambda: |-
      return id(tare_w2);

    update_interval: 1s  
    
    filters:
      - delta: 0.01

text_sensor:
  - platform: wifi_info

    ip_address:
      name: "IP Adresse"
      id: ip_address

    ssid:
      name: "SSID"

  - platform: version
    name: "ESPHome Version"

binary_sensor:
  - platform: status
    name: "Online"

  - platform: gpio
    name: "Anzeige wechseln"

    pin:
      number: GPIO32
      mode:
        input: true
        pullup: true
      inverted: true

    on_press:
      then:
        - lambda: |-
            if (id(aktive_waage) == 1)
              id(aktive_waage) = 2;
            else
              id(aktive_waage) = 1;

  - platform: gpio
    name: "Tare Taste"

    pin:
      number: GPIO33
      mode:
        input: true
        pullup: true
      inverted: true

    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms

    on_press:
      then:
        - logger.log: "Tare gedrueckt"
        - lambda: |-
            if(id(aktive_waage) == 1)
            {
              ESP_LOGI("TARE", "Waage1=%.3f TaraAlt=%.3f",
                      id(waage1).state,
                      id(tare_w1));

              id(tare_w1) += id(waage1).state;

              ESP_LOGI("TARE", "TaraNeu=%.3f",
                      id(tare_w1));
            }
            else
            {
              ESP_LOGI("TARE", "Waage2=%.3f TaraAlt=%.3f",
                      id(waage2).state,
                      id(tare_w2));

              id(tare_w2) += id(waage2).state;

              ESP_LOGI("TARE", "TaraNeu=%.3f",
                      id(tare_w2));
            }  
  
number:
  - platform: template
    name: "Referenzgewicht Waage1"
    mode: box

    min_value: 0.001
    max_value: 10
    step: 0.001

    lambda: |-
      return id(referenzgewicht_w1);

    set_action:
      - lambda: |-
          id(referenzgewicht_w1) = x;

  - platform: template
    name: "Referenzgewicht Waage2"
    mode: box

    min_value: 0.001
    max_value: 10
    step: 0.001

    lambda: |-
      return id(referenzgewicht_w2);

    set_action:
      - lambda: |-
          id(referenzgewicht_w2) = x;

button:
  - platform: template
    name: "Waage1 Nullpunkt speichern"

    on_press:
      - lambda: |-
          id(nullpunkt_w1) = id(waage1_raw).state;

  - platform: template
    name: "Waage1 Referenz speichern"

    on_press:
      - lambda: |-
          id(referenz_w1) = id(waage1_raw).state;

  - platform: template
    name: "Waage2 Nullpunkt speichern"

    on_press:
      - lambda: |-
          id(nullpunkt_w2) = id(waage2_raw).state;

  - platform: template
    name: "Waage2 Referenz speichern"

    on_press:
      - lambda: |-
          id(referenz_w2) = id(waage2_raw).state;
          
  - platform: template
    name: "Waage1 Tara löschen"

    on_press:
      - lambda: |-
          id(tare_w1) = 0;

  - platform: template
    name: "Waage2 Tara löschen"

    on_press:
      - lambda: |-
          id(tare_w2) = 0;

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    update_interval: 1s

    lambda: |-
      if (id(aktive_waage) == 1)
      {
        it.printf(0, 0, id(font16), "Waage 1");
        it.printf(0, 20, id(font16), "%.2f", id(waage1).state);
        it.printf(50, 20, id(font16), " / %.2f kg", id(tare_w1));
      }
      else
      {
        it.printf(0, 0, id(font16), "Waage 2");
        it.printf(0, 20, id(font16), "%.2f kg", id(waage2).state);
        it.printf(50, 20, id(font16), "T: %.2f", id(tare_w2));
      }

      it.printf(
        0,
        48,
        id(font16),
        "%s",
        id(ip_address).state.c_str()
      );