esphome:
  name: drucksensor
  friendly_name: Drucksensor
  project:
    name: maennel.drucksensor
    version: "0.1.0"

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  level: INFO

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  # ssid: !secret wifi_ssid  
  # password: !secret wifi_password

  ap:
    ssid: !secret ap_ssid
    password: !secret ap_password

captive_portal:

web_server:
  port: 80  
  auth:
    username: admin
    password: !secret webserver_password


api:
  encryption:
    key: !secret api_key

